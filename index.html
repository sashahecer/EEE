<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Game Pure JavaScript</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        canvas {
            background: #eee;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <canvas id="game" width="480" height="320"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let points = 0;
        document.addEventListener('click', handleClick);
        function textToCanvas() {
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(`Points: ${points}`, 10, 30);
        }
        function handleClick() {
            points++;
            textToCanvas();
        }
    </script>
</body>

</html>
