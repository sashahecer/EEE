<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Game Pure JavaScript</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        canvas {
            background: #eee;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <script>
     let points = 0;
     document.addEventListener('click', handleClick);
     function handleClick() {
        points++;
        console.log(points);
     }
    </script>
</body>

</html>
